<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F8F7F4" />
    
    <!-- Suporte Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CAPIO" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- SEO Básico -->
    <title>CAPIO — Um espaço de leitura, oração e silêncio</title>
    <meta name="description" content="CAPIO é uma experiência contemplativa de leitura bíblica, oração e reflexão guiada." />
    
    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://capio.app/" />
    <meta property="og:title" content="CAPIO — Um lugar simples para encontrar Deus na Escritura." />
    <meta property="og:description" content="Leia a Palavra, ore com simplicidade e encontre um momento diário de descanso com Deus." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://capio.app/" />
    <meta property="twitter:title" content="CAPIO — Um lugar simples para encontrar Deus na Escritura." />
    <meta property="twitter:description" content="Leia a Palavra, ore com simplicidade e encontre um momento diário de descanso com Deus." />
    <meta property="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=block">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=block" rel="stylesheet">

  </head>
  <body>
    <div id="root">
      <!-- App Shell Visual Imediato para evitar White Flash -->
      <style>
        body {
          margin: 0;
          background-color: #F8F7F4 !important;
          font-family: 'Lora', Georgia, serif;
          color: rgba(44, 42, 38, 0.8);
        }
        .shell-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          min-height: 100dvh;
          background-color: #F8F7F4;
          text-align: center;
        }
        .shell-title {
          font-size: 14px;
          letter-spacing: 0.4em;
          text-transform: uppercase;
          color: rgba(44, 42, 38, 0.35);
          animation: shell-fade-in 1.2s ease-out forwards;
          opacity: 0;
          font-weight: 400;
        }
        .shell-subtitle {
          margin-top: 16px;
          font-size: 11px;
          font-style: italic;
          color: rgba(44, 42, 38, 0.25);
          letter-spacing: 0.1em;
          animation: shell-fade-in-delayed 2.2s ease-out forwards;
          opacity: 0;
        }
        @keyframes shell-fade-in {
          0% { opacity: 0; transform: translateY(6px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes shell-fade-in-delayed {
          0% { opacity: 0; }
          40% { opacity: 0; transform: translateY(4px); }
          100% { opacity: 1; transform: translateY(0); }
        }
      </style>
      <div class="shell-container">
        <div class="shell-title">CAPIO</div>
        <div class="shell-subtitle">Respire.</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
